name: MNNSR for Android (NDK r29)

on:
  push:
    branches: [ master ]
    paths:
      - 'RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni/**'
      - '.github/workflows/mnnsr-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential unzip cmake git wget file \
            gcc-12 g++-12
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 120 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-12
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-12 120
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-12 120

      - name: Download and setup Android NDK
        run: |
          wget -nv --retry-connrefused --waitretry=5 --timeout=30 --tries=5 \
            https://googledownloads.cn/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r29" >> $GITHUB_ENV
        working-directory: 3rdparty

      # 使用新的 MNN 预编译包 MNN.zip
      - name: Download and prepare MNN for Android
        run: |
          mkdir -p mnn_android
          cd mnn_android
          wget -nv --retry-connrefused --waitretry=5 --timeout=30 --tries=5 \
            https://github.com/CELEFT/C/releases/download/mnn/MNN.zip
          unzip -q MNN.zip
          # 解压后得到 MNN/ 目录，内含 lib/ 和 include/
          # 查看解压后的结构（用于调试）
          echo "=== MNN package structure ==="
          find MNN -type f | head -10
          # 创建 ABI 子目录（项目硬编码为 arm64-v8a）
          mkdir -p arm64-v8a
          # 将所有 .so 文件从 MNN/lib/ 复制到 arm64-v8a/
          if [ -d MNN/lib ]; then
              cp MNN/lib/*.so arm64-v8a/ 2>/dev/null || echo "No .so files found in MNN/lib/"
          else
              echo "Warning: MNN/lib directory not found, searching for .so files elsewhere"
              find MNN -name "*.so" -exec cp {} arm64-v8a/ \;
          fi
          # 检查必要的库是否存在
          if [ ! -f arm64-v8a/libMNN.so ]; then
              echo "Error: libMNN.so not found"
              exit 1
          fi
          # 创建 libMNN_CL.so 软链接（项目有时需要）
          ln -sf libMNN.so arm64-v8a/libMNN_CL.so
          # 处理头文件：期望 MNN/include/ 下包含 MNN/ 子目录
          if [ -d MNN/include ]; then
              # 检查是直接包含头文件还是包含 MNN/ 子目录
              if [ -f MNN/include/MNN/Tensor.hpp ]; then
                  # 已经是 include/MNN/Tensor.hpp，直接复制
                  cp -r MNN/include ./
              elif [ -d MNN/include/MNN ]; then
                  # 包含 MNN/ 子目录，复制整个 include
                  cp -r MNN/include ./
              else
                  # 其他情况：假设头文件直接在 include 下，创建 MNN/ 子目录并移动
                  mkdir -p include/MNN
                  mv MNN/include/* include/MNN/ 2>/dev/null || true
              fi
          else
              echo "Error: MNN/include directory not found"
              exit 1
          fi
          # 验证头文件位置
          echo "=== Header files ==="
          ls -la include/MNN/ || echo "MNN/ subdir not found in include/"
          # 清理临时文件
          rm -rf MNN MNN.zip
        working-directory: 3rdparty

      - name: Download prebuilt ncnn for Android (with Vulkan)
        run: |
          wget --retry-connrefused --waitretry=5 --timeout=30 --tries=5 -nv \
            https://github.com/Tencent/ncnn/releases/download/20260113/ncnn-20260113-android-vulkan-shared.zip
          unzip -q ncnn-20260113-android-vulkan-shared.zip
          mv ncnn-20260113-android-vulkan-shared ncnn-android
        working-directory: 3rdparty

      - name: Download OpenCV Android SDK
        run: |
          wget --retry-connrefused --waitretry=5 --timeout=30 --tries=5 -nv \
            https://github.com/opencv/opencv/releases/download/4.13.0/opencv-4.13.0-android-sdk.zip
          unzip -q opencv-4.13.0-android-sdk.zip
        working-directory: 3rdparty

      - name: Download libwebp source
        run: |
          git clone https://github.com/webmproject/libwebp --depth 1 3rdparty/libwebp
        working-directory: ${{ github.workspace }}

      - name: Set up CMake toolchain and variables
        run: |
          echo "ABI=arm64-v8a" >> $GITHUB_ENV
          echo "MNN_ROOT=$PWD/3rdparty/mnn_android" >> $GITHUB_ENV
          echo "NCNN_DIR=$PWD/3rdparty/ncnn-android" >> $GITHUB_ENV
          echo "OpenCV_DIR=$PWD/3rdparty/OpenCV-android-sdk/sdk/native/jni" >> $GITHUB_ENV
        working-directory: ${{ github.workspace }}

      - name: Build MNNSR for Android
        run: |
          # 验证 MNN 头文件是否存在（用于调试）
          echo "Checking MNN headers:"
          ls -la $MNN_ROOT/include/MNN/ || true
          # 设置 CXXFLAGS 环境变量确保头文件路径
          export CXXFLAGS="-I$MNN_ROOT/include"
          mkdir -p build && cd build
          # 清除缓存强制重新配置
          rm -f CMakeCache.txt
          rm -rf CMakeFiles
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-30 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenCV_DIR=$OpenCV_DIR \
            -Dncnn_DIR=$NCNN_DIR/lib/cmake/ncnn \
            -DMNN_ROOT=$MNN_ROOT \
            -DLIBWEBP_ROOT=${{ github.workspace }}/3rdparty/libwebp
          make -j$(nproc)
          mkdir -p mnnsr-android/lib
          cp mnnsr-ncnn mnnsr-android/ 2>/dev/null || true
          find . -name "*.so" -exec cp {} mnnsr-android/lib/ \;
          cp ../../../../*.md mnnsr-android/ 2>/dev/null || true
        working-directory: RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni/

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mnnsr-android-ndk29-${{ env.ABI }}
          path: RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni/build/mnnsr-android
          retention-days: 90
